name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    name: Build - ${{ matrix.name_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pointzerver-linux-x86_64
            name_suffix: Linux (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pointzerver-windows-x86_64.exe
            name_suffix: Windows (x86_64)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pointzerver-macos-x86_64
            name_suffix: macOS (Intel)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pointzerver-macos-aarch64
            name_suffix: macOS (Apple Silicon)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxdo-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            PointZerver/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binary
        working-directory: PointZerver
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-deb (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deb

      - name: Build .deb package (Linux only)
        if: matrix.os == 'ubuntu-latest'
        working-directory: PointZerver
        run: |
          cargo deb --target ${{ matrix.target }} --no-build

      - name: Prepare artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp PointZerver/target/${{ matrix.target }}/release/pointzerver.exe ${{ matrix.artifact_name }}
          else
            cp PointZerver/target/${{ matrix.target }}/release/pointzerver ${{ matrix.artifact_name }}
          fi

      - name: Find and prepare .deb package (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          DEB_FILE=$(find PointZerver/target/${{ matrix.target }}/debian -name "*.deb" | head -n 1)
          if [ -f "$DEB_FILE" ]; then
            cp "$DEB_FILE" pointzerver-linux-x86_64.deb
            echo "DEB_CREATED=true" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 90

      - name: Upload .deb artifact (Linux only)
        if: matrix.os == 'ubuntu-latest' && env.DEB_CREATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pointzerver-linux-x86_64.deb
          path: pointzerver-linux-x86_64.deb
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release_files
          # Copy artifacts from their subdirectories to release_files
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              cp "$artifact_dir"* release_files/ 2>/dev/null || true
            fi
          done
          echo "Release files:"
          ls -lh release_files/

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: PointZ Server ${{ steps.version.outputs.version }}
          body: |
            ## PointZ Server ${{ steps.version.outputs.version }}

            Download the server binary for your operating system:

            - **Linux (x86_64)**:
              - `.deb` package (recommended): `pointzerver-linux-x86_64.deb`
              - Raw binary: `pointzerver-linux-x86_64`
            - **Windows (x86_64)**: `pointzerver-windows-x86_64.exe`
            - **macOS (Intel)**: `pointzerver-macos-x86_64`
            - **macOS (Apple Silicon)**: `pointzerver-macos-aarch64`

            ### Installation

            **Linux (Debian/Ubuntu/Mint):**
            ```bash
            sudo dpkg -i pointzerver-linux-x86_64.deb
            # Or double-click the .deb file
            # Then run: pointzerver
            ```

            **Other platforms:**
            1. Download the binary for your OS
            2. Run it (it will appear in your system tray)
            3. Right-click the tray icon → "Show QR Code"
            4. Scan QR code with PointZ mobile app
            5. App will auto-discover and connect

            ### Notes

            - Server runs in background (system tray)
            - No console window needed
            - Right-click tray icon for options
          files: release_files/*
          draft: false
          prerelease: false

