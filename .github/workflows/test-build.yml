name: Test Build

on:
  push:
    branches:
      - main
    paths:
      - 'PointZerver/**'
      - 'PointZ/**'
      - '.github/workflows/test-build.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'PointZ/pubspec.yaml'
      - 'PointZ/pubspec.lock'
  pull_request:
    branches:
      - main
    paths:
      - 'PointZerver/**'
      - 'PointZ/**'
      - '.github/workflows/test-build.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'PointZ/pubspec.yaml'
      - 'PointZ/pubspec.lock'

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config libgtk-3-dev libgdk-pixbuf2.0-dev libatk1.0-dev libpango1.0-dev libcairo2-dev libglib2.0-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libx11-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libxdo-dev
          version: 1.0

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: PointZerver

      - name: Run clippy
        working-directory: PointZerver
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        working-directory: PointZerver
        run: cargo test --workspace

  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Get dependencies
        working-directory: PointZ
        run: flutter pub get

      - name: Analyze
        working-directory: PointZ
        run: flutter analyze

      - name: Run tests
        working-directory: PointZ
        run: flutter test
